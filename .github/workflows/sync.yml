name: Sync KPI Engine V2

on:
  schedule:
    - cron: '0 6,8,10,13,15,17,19 * * *'
    
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
      
      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
      
      - name: Zapamiętaj/Przywróć Cache
        id: kpi-cache
        uses: actions/cache@v4
        with:
          path: cache
          key: kpi-cache-v1-${{ github.run_id }}
          restore-keys: |
            kpi-cache-v1-
      
      - name: Create Cache Directory
        run: mkdir -p cache
      
      - name: Install Dependencies
        run: pip install "notion-client==2.2.1"
      
      - name: Run Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          KALENDARZ_DB_ID: ${{ secrets.KALENDARZ_DB_ID }}
          AKTYWNOSCI_DB_ID: ${{ secrets.AKTYWNOSCI_DB_ID }}
          WYNIKI_DB_ID: ${{ secrets.WYNIKI_DB_ID }}
        run: python sync.py
